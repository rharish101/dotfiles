general {
    lock_cmd = pidof hyprlock || hyprlock # Avoid starting multiple lock commands.
    before_sleep_cmd = loginctl lock-session
    after_sleep_cmd = loginctl unlock-session
}

listener {
    timeout = 60
    on-timeout = ddcutil setvcp 10 - 20
    on-resume = ddcutil setvcp 10 + 20
}

listener {
    timeout = 120
    # Only run when Hyprlock isn't running.
    on-timeout = pidof hyprlock || loginctl lock-session && hyprctl dispatch 'hl.dsp.dpms({ action = "off" })'
}

listener {
    timeout = 10
    # Only run when Hyprlock is running.
    on-timeout = pidof hyprlock && hyprctl dispatch 'hl.dsp.dpms({ action = "off" })'
}
